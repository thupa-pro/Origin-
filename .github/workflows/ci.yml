name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - run: cargo install cbindgen --locked
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo deny check
      - run: cargo build
      - run: cargo test
      - run: cargo test --all-features
      - run: cargo build -p origin-core --target wasm32-unknown-unknown
      - run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings
      - run: mkdir -p sdk/typescript/bin && cp target/wasm32-unknown-unknown/debug/origin_core.wasm sdk/typescript/bin/origin-core.wasm
      - run: node --test sdk/typescript/test.mjs
      - run: cbindgen --config origin-core/cbindgen.toml --crate origin-core --output sdk/c/origin_core.h
      - run: test -s sdk/c/origin_core.h
      - run: cargo bench --no-run

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz build
      - run: cargo +nightly fuzz run fuzz_parse -- -runs=50000
      - run: cargo +nightly fuzz run fuzz_binary -- -runs=50000
      - run: cargo +nightly fuzz run fuzz_base64 -- -runs=50000
