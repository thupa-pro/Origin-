# CI pipeline for Origin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt, clippy, llvm-tools-preview
    - name: Format
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: Build
      run: cargo build --release
    - name: Test
      run: cargo test
    - name: Docs
      run: cargo doc --no-deps --document-private-items
    - name: Deny
      run: |
        cargo install cargo-deny --quiet 2>/dev/null || true
        cargo deny check
    - name: Audit
      run: |
        cargo install cargo-audit --quiet 2>/dev/null || true
        cargo audit 2>/dev/null || echo "cargo audit found issues (non-blocking for alpha)"

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: llvm-tools-preview
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --quiet 2>/dev/null || true
    - name: Code coverage
      run: cargo llvm-cov --all-features --lcov --output-path lcov.info
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        path-to-lcov: lcov.info
      continue-on-error: true
