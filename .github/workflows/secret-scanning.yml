name: "Secret Scanning"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Secret Scanning
      uses: trufflesecurity/trufflehog@v3
      with:
        extra_args: --only-verified
