name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
    - uses: actions/checkout@v6
    - id: create-release
      uses: softprops/action-gh-release@v3
      with:
        name: ${{ github.ref_name }}
        body_path: CHANGELOG.md
        draft: true
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        generate_release_notes: true

  publish-crates-io:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - run: cargo publish -p origin-core
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - run: cargo publish -p origin-cli
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: ${{ matrix.target }}
    - run: cargo build --release --target ${{ matrix.target }}
    - name: Sign binary with Origin
      run: |
        echo "${{ secrets.ORIGIN_RELEASE_KEY }}" > /tmp/release.key
        ./target/${{ matrix.target }}/release/origin sign \
          target/${{ matrix.target }}/release/origin \
          --key /tmp/release.key
        rm -f /tmp/release.key
      env:
        ORIGIN_RELEASE_KEY: ${{ secrets.ORIGIN_RELEASE_KEY }}
    - name: Update release provenance in docs (Linux only)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main
        git checkout main
        cp target/${{ matrix.target }}/release/origin.origin docs/origin-linux-x86_64.origin
        git add docs/origin-linux-x86_64.origin
        git diff --cached --quiet || git commit -m "ci: update release provenance for ${{ github.ref_name }}"
        git pull --rebase origin main
        git push
    - name: Update v1 tag (Linux only)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        git tag -f v1
        git push origin v1 --force
    - name: Upload binary
      uses: softprops/action-gh-release@v3
      with:
        files: |
          target/${{ matrix.target }}/release/origin
          target/${{ matrix.target }}/release/origin.origin
