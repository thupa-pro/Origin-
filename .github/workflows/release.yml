name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
    - uses: actions/checkout@v6
    - id: create-release
      uses: softprops/action-gh-release@v3
      with:
        name: ${{ github.ref_name }}
        body_path: CHANGELOG.md
        draft: true
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        generate_release_notes: true

  publish-crates-io:
    runs-on: ubuntu-latest
    needs: create-release
    continue-on-error: true
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - run: cargo publish -p origin-core
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - run: cargo publish -p origin-cli
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-x86_64-linux:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    env:
      TARGET: x86_64-unknown-linux-gnu
      CARGO_TARGET_DIR: /tmp/origin-target
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: x86_64-unknown-linux-gnu
    - run: cargo build --release --target x86_64-unknown-linux-gnu
      env:
        CARGO_TARGET_DIR: /tmp/origin-target
    - name: Sign binary with Origin (optional — requires ORIGIN_RELEASE_KEY secret)
      continue-on-error: true
      run: |
        if [ -n "${{ secrets.ORIGIN_RELEASE_KEY }}" ]; then
          echo "${{ secrets.ORIGIN_RELEASE_KEY }}" > /tmp/release.key
          /tmp/origin-target/x86_64-unknown-linux-gnu/release/origin sign \
            /tmp/origin-target/x86_64-unknown-linux-gnu/release/origin \
            --key /tmp/release.key
          rm -f /tmp/release.key
        else
          echo "ORIGIN_RELEASE_KEY not set — skipping binary signing"
        fi
    - name: Update release provenance in docs (optional)
      continue-on-error: true
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main
        git checkout main
        if [ -f /tmp/origin-target/x86_64-unknown-linux-gnu/release/origin.origin ]; then
          cp /tmp/origin-target/x86_64-unknown-linux-gnu/release/origin.origin docs/origin-linux-x86_64.origin
          git add docs/origin-linux-x86_64.origin
          git diff --cached --quiet || git commit -m "ci: update release provenance for ${{ github.ref_name }}"
          git pull --rebase origin main
          git push
        else
          echo "Signed binary not found — skipping provenance update"
        fi
    - name: Update v1 tag
      continue-on-error: true
      run: |
        git tag -f v1
        git push origin v1 --force
    - name: Prepare unique binary names
      run: |
        cp /tmp/origin-target/x86_64-unknown-linux-gnu/release/origin /tmp/origin-target/origin-x86_64-unknown-linux-gnu
        if [ -f /tmp/origin-target/x86_64-unknown-linux-gnu/release/origin.origin ]; then
          cp /tmp/origin-target/x86_64-unknown-linux-gnu/release/origin.origin /tmp/origin-target/origin-x86_64-unknown-linux-gnu.origin
        fi
    - name: Upload binary
      uses: softprops/action-gh-release@v3
      with:
        files: |
          /tmp/origin-target/origin-x86_64-unknown-linux-gnu
          /tmp/origin-target/origin-x86_64-unknown-linux-gnu.origin

  build-aarch64-linux:
    runs-on: ubuntu-24.04-arm
    needs: create-release
    permissions:
      contents: write
    env:
      TARGET: aarch64-unknown-linux-gnu
      CARGO_TARGET_DIR: /tmp/origin-target
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: aarch64-unknown-linux-gnu
    - run: cargo build --release --target aarch64-unknown-linux-gnu
      env:
        CARGO_TARGET_DIR: /tmp/origin-target
    - name: Prepare unique binary name
      run: |
        cp /tmp/origin-target/aarch64-unknown-linux-gnu/release/origin /tmp/origin-target/origin-aarch64-unknown-linux-gnu
        if [ -f /tmp/origin-target/aarch64-unknown-linux-gnu/release/origin.origin ]; then
          cp /tmp/origin-target/aarch64-unknown-linux-gnu/release/origin.origin /tmp/origin-target/origin-aarch64-unknown-linux-gnu.origin
        fi
    - name: Upload binary
      uses: softprops/action-gh-release@v3
      with:
        files: |
          /tmp/origin-target/origin-aarch64-unknown-linux-gnu
          /tmp/origin-target/origin-aarch64-unknown-linux-gnu.origin

  publish-docker:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write
    continue-on-error: true
    env:
      CARGO_TARGET_DIR: /tmp/origin-target
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - run: cargo build --release --bin origin
    - name: Copy binary into context
      run: cp /tmp/origin-target/release/origin origin-linux-x86_64
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push distroless image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/origin:${{ github.ref_name }}
          ghcr.io/${{ github.repository_owner }}/origin:latest
        provenance: false

  build-windows:
    runs-on: windows-latest
    needs: create-release
    permissions:
      contents: write
    env:
      TARGET: x86_64-pc-windows-msvc
      CARGO_TARGET_DIR: D:\a\origin-target
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: x86_64-pc-windows-msvc
    - run: cargo build --release --target x86_64-pc-windows-msvc
      env:
        CARGO_TARGET_DIR: D:\a\origin-target
    - name: Prepare unique binary name
      run: |
        copy D:\a\origin-target\x86_64-pc-windows-msvc\release\origin.exe D:\a\origin-target\origin-x86_64-pc-windows-msvc.exe
      shell: cmd
    - name: Upload binary
      uses: softprops/action-gh-release@v3
      with:
        files: D:\a\origin-target\origin-x86_64-pc-windows-msvc.exe

  build-macos:
    runs-on: macos-latest
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: ${{ matrix.target }}
    - run: cargo build --release --target ${{ matrix.target }}
      env:
        CARGO_TARGET_DIR: /tmp/origin-target
    - name: Prepare unique binary name
      run: cp /tmp/origin-target/${{ matrix.target }}/release/origin /tmp/origin-target/origin-${{ matrix.target }}
    - name: Upload binary
      uses: softprops/action-gh-release@v3
      with:
        files: /tmp/origin-target/origin-${{ matrix.target }}
