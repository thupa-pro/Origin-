name: Feature Request
description: Suggest an idea for Origin
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: It's frustrating when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative solutions
      description: What else have you considered?

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This change is within Origin's scope (provenance protocol — no identity, no network, no blockchain)
          required: false
