[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
    "NCSA",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "allow"
skip = [
    # libfuzzer-sys pulls in getrandom 0.3 via cc → jobserver
    { crate = "getrandom@0.3.4", reason = "only used by libfuzzer-sys build dep" },
]

[advisories]
ignore = []
