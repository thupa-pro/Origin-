[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
    "NCSA",
    "ISC",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "allow"
skip = [
    { crate = "getrandom@0.3.4", reason = "only used by libfuzzer-sys build dep" },
    { crate = "unicode-width@0.1.14", reason = "old unicode-width pulled by miette deps" },
]

[advisories]
ignore = []
